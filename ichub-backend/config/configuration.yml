hostname: "http://localhost:9000"
bpn: "BPNL00000000080L"

authorization:
  enabled: true
  api_key:
    key: "X-Api-Key"
    value: "HACKATHON1-HACKATHON1-HACKATHON1"
  keycloak:
    enabled: false

agreements:
  - semanticid: urn:samm:io.catenax.generic.digital_product_passport:6.1.0#DigitalProductPassport
    usage:
      context:
        - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
        - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
        - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
      permissions:
        - action: "use"
          constraint:
            and:
              - leftOperand: "FrameworkAgreement"
                operator: "eq"
                rightOperand: "DataExchangeGovernance:1.0"
              - leftOperand: "Membership"
                operator: "eq"
                rightOperand: "active"
              - leftOperand: "UsagePurpose"
                operator: "isAnyOf"
                rightOperand: "cx.circular.dpp:1"
      prohibitions: []
      obligations: []
    access:
      context:
        - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
        - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
        - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
      permissions:
        - action: access
          constraint:
            leftOperand: "Membership"
            operator: "eq"
            rightOperand: "active"
      prohibitions: []
      obligations: []
  - semanticid: urn:samm:io.catenax.serial_part:3.0.0#SerialPart
    usage:
      context:
        - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
        - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
        - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
      permissions:
        - action: "use"
          constraint:
            and:
              - leftOperand: "FrameworkAgreement"
                operator: "eq"
                rightOperand: "DataExchangeGovernance:1.0"
              - leftOperand: "Membership"
                operator: "eq"
                rightOperand: "active"
              - leftOperand: "UsagePurpose"
                operator: "isAnyOf"
                rightOperand: "cx.core.industrycore:1"
      prohibitions: []
      obligations: []
    access:
      context:
        - "https://w3id.org/catenax/2025/9/policy/odrl.jsonld"
        - "https://w3id.org/catenax/2025/9/policy/context.jsonld"
        - "@vocab": "https://w3id.org/edc/v0.0.1/ns/"
      permissions:
        - action: "access"
          constraint:
            leftOperand: "Membership"
            operator: "eq"
            rightOperand: "active"
      prohibitions: []
      obligations: []

database:
  connection_string: "postgresql://user:password@localhost:5432/ichub"
  echo: false

cors:
  enabled: true
  allow_origins:
    - "http://localhost:5173"
    - "http://localhost:3000"
    - "http://127.0.0.1:5173"
    - "http://127.0.0.1:3000"
  allow_credentials: true
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allow_headers:
    - "*"

