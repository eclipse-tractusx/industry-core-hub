    oauth:
      url: "https://centralidp.esauto-x.com/auth/"
      realm: "CX-Central"
      client_id: "sa6"
      client_secret: "gfbYYENgMXFfJSwTIRWgXy2ATqhQQUHK"
    digitalTwinRegistry:
      dct_type_key: "dct:type"
      dct_type_filter:
        operandLeft: "'http://purl.org/dc/terms/type'.'@id'"
