<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="520" fill="#ffffff"/>
  <rect x="12" y="12" width="876" height="496" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="40" rx="12" fill="#012060"/>
  <rect x="12" y="40" width="876" height="12" fill="#012060"/>
  <circle cx="36" cy="32" r="6" fill="#ff5f57"/><circle cx="56" cy="32" r="6" fill="#febc2e"/><circle cx="76" cy="32" r="6" fill="#28c840"/>
  <text x="450" y="37" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Industry Core Hub</text>

  <rect x="12" y="52" width="250" height="456" fill="#f7f8fa"/>
  <line x1="262" y1="52" x2="262" y2="508" stroke="#e3e3e3" stroke-width="1.5"/>

  <text x="34" y="82" font-size="11" font-weight="700" fill="#8a8a8a" letter-spacing="1">INDUSTRY CORE</text>
  <text x="44" y="106" font-size="13" fill="#999">Catalog Parts</text>
  <text x="44" y="130" font-size="13" fill="#999">Dataspace Discovery</text>
  <text x="34" y="162" font-size="11" font-weight="700" fill="#8a8a8a" letter-spacing="1">BUSINESS PARTNER</text>
  <text x="44" y="186" font-size="13" fill="#999">Contact List</text>
  <text x="34" y="218" font-size="11" font-weight="700" fill="#8a8a8a" letter-spacing="1">PCF</text>
  <text x="44" y="242" font-size="13" fill="#999">PCF Precalculation</text>
  <text x="44" y="266" font-size="13" fill="#999">PCF Management</text>
  <text x="44" y="290" font-size="13" fill="#999">PCF Requests</text>

  <!-- CCM group highlighted -->
  <rect x="24" y="306" width="226" height="112" fill="#F3EDFA" stroke="#9D6FD4" stroke-width="1.5" rx="8"/>
  <text x="34" y="328" font-size="11" font-weight="700" fill="#6B3FA0" letter-spacing="1">CCM</text>
  <text x="44" y="354" font-size="13" font-weight="600" fill="#6B3FA0">Certificate Management</text>
  <text x="44" y="380" font-size="13" font-weight="600" fill="#6B3FA0">CCM Provision Management</text>
  <text x="44" y="406" font-size="13" font-weight="600" fill="#6B3FA0">CCM Consumption</text>
  <circle cx="240" cy="354" r="12" fill="#FFA600"/><text x="240" y="358" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <circle cx="240" cy="380" r="12" fill="#FFA600"/><text x="240" y="384" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <circle cx="240" cy="406" r="12" fill="#FFA600"/><text x="240" y="410" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>

  <text x="300" y="90" font-size="20" font-weight="700" fill="#111">The CCM KIT — three screens</text>
  <rect x="300" y="100" width="90" height="5" fill="#B3CB2D" rx="3"/>

  <circle cx="316" cy="150" r="13" fill="#FFA600"/><text x="316" y="155" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="340" y="147" font-size="15" font-weight="700" fill="#333">Certificate Management</text>
  <text x="340" y="167" font-size="13" fill="#666">Create and manage your own compliance certificates.</text>

  <circle cx="316" cy="215" r="13" fill="#FFA600"/><text x="316" y="220" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="340" y="212" font-size="15" font-weight="700" fill="#333">CCM Provision Management</text>
  <text x="340" y="232" font-size="13" fill="#666">Provider cockpit — respond to and send certificates.</text>

  <circle cx="316" cy="280" r="13" fill="#FFA600"/><text x="316" y="285" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="340" y="277" font-size="15" font-weight="700" fill="#333">CCM Consumption</text>
  <text x="340" y="297" font-size="13" fill="#666">Consumer cockpit — request, download and review certificates.</text>

  <rect x="300" y="340" width="560" height="140" fill="#F3EDFA" stroke="#9D6FD4" stroke-width="1.5" rx="10"/>
  <text x="320" y="368" font-size="13" font-weight="700" fill="#6B3FA0">Tip</text>
  <text x="320" y="392" font-size="13" fill="#555">If the CCM group is not visible, open KIT Features at the bottom of</text>
  <text x="320" y="412" font-size="13" fill="#555">the sidebar and enable the CCM KIT first.</text>
</svg>
