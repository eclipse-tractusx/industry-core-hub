<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#ffffff"/>
  <rect x="12" y="12" width="876" height="436" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="38" rx="12" fill="#FFA600"/>
  <rect x="12" y="38" width="876" height="12" fill="#FFA600"/>
  <circle cx="36" cy="31" r="5" fill="#ffffff" opacity="0.9"/><circle cx="54" cy="31" r="5" fill="#ffffff" opacity="0.7"/><circle cx="72" cy="31" r="5" fill="#ffffff" opacity="0.5"/>
  <rect x="92" y="19" width="460" height="24" rx="12" fill="#ffffff"/>
  <text x="108" y="36" font-size="12" fill="#666">/pcf/management</text>
  <rect x="762" y="19" width="114" height="24" rx="12" fill="#ffffff"/>
  <text x="819" y="36" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>

  <text x="40" y="82" font-size="16" font-weight="700" fill="#111">Dual PCF Creation — Step 3: Review &amp; Save</text>

  <circle cx="60" cy="112" r="14" fill="#B3CB2D"/><text x="60" y="117" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">&#10003;</text>
  <text x="82" y="117" font-size="12" fill="#777">v9.0.0</text>
  <line x1="150" y1="112" x2="210" y2="112" stroke="#B3CB2D" stroke-width="2"/>
  <circle cx="230" cy="112" r="14" fill="#B3CB2D"/><text x="230" y="117" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">&#10003;</text>
  <text x="252" y="117" font-size="12" fill="#777">v7.0.0</text>
  <line x1="320" y1="112" x2="380" y2="112" stroke="#B3CB2D" stroke-width="2"/>
  <circle cx="400" cy="112" r="14" fill="#1B5E20"/><text x="400" y="117" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="422" y="117" font-size="12" font-weight="600" fill="#333">Review &amp; Save</text>

  <rect x="40" y="146" width="810" height="40" rx="8" fill="#FFF7EC" stroke="#FFA600"/>
  <text x="60" y="171" font-size="13" font-weight="700" fill="#8a5a00">1 difference found between v9.0.0 and v7.0.0 — pick the value to keep</text>
  <circle cx="40" cy="146" r="12" fill="#FFA600"/><text x="40" y="150" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <text x="60" y="216" font-size="13" font-weight="700" fill="#333">pcf.declaredUnit</text>
  <rect x="60" y="228" width="240" height="46" rx="8" fill="#ffffff" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="180" y="250" font-size="12" font-weight="700" fill="#1B5E20" text-anchor="middle">Use v9.0.0</text>
  <text x="180" y="266" font-size="11" fill="#555" text-anchor="middle">(piece)</text>
  <rect x="312" y="228" width="240" height="46" rx="8" fill="#ffffff" stroke="#cfcfcf"/>
  <text x="432" y="250" font-size="12" font-weight="700" fill="#555" text-anchor="middle">Use v7.0.0</text>
  <text x="432" y="266" font-size="11" fill="#888" text-anchor="middle">(item)</text>
  <rect x="564" y="228" width="286" height="46" rx="8" fill="#f7f7f7" stroke="#cfcfcf"/>
  <text x="580" y="256" font-size="12" fill="#9a9a9a">Enter custom value…</text>

  <rect x="40" y="300" width="810" height="60" rx="10" fill="#F5F9EE" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="60" y="326" font-size="12" fill="#444">Reconcile any differences so both versions are consistent. When there are none, this step just</text>
  <text x="60" y="346" font-size="12" fill="#444">confirms the data before saving.</text>

  <rect x="40" y="380" width="120" height="42" rx="8" fill="#ffffff" stroke="#c0c0c0"/>
  <text x="100" y="406" font-size="13" fill="#555" text-anchor="middle">Back to v7.0.0</text>
  <rect x="670" y="380" width="180" height="42" rx="8" fill="#1B5E20"/>
  <text x="760" y="406" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Save Both PCFs</text>
  <circle cx="670" cy="380" r="13" fill="#FFA600"/><text x="670" y="385" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
</svg>
