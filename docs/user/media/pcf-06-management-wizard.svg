<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="470" fill="#ffffff"/>
  <rect x="12" y="12" width="876" height="446" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="38" rx="12" fill="#FFA600"/>
  <rect x="12" y="38" width="876" height="12" fill="#FFA600"/>
  <circle cx="36" cy="31" r="5" fill="#ffffff" opacity="0.9"/><circle cx="54" cy="31" r="5" fill="#ffffff" opacity="0.7"/><circle cx="72" cy="31" r="5" fill="#ffffff" opacity="0.5"/>
  <rect x="92" y="19" width="460" height="24" rx="12" fill="#ffffff"/>
  <text x="108" y="36" font-size="12" fill="#666">/pcf/management</text>
  <rect x="762" y="19" width="114" height="24" rx="12" fill="#ffffff"/>
  <text x="819" y="36" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>

  <text x="40" y="82" font-size="16" font-weight="700" fill="#111">Dual PCF Creation — Step 1: Create PCF v9.0.0</text>

  <!-- stepper -->
  <circle cx="60" cy="112" r="14" fill="#1B5E20"/><text x="60" y="117" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="82" y="117" font-size="12" font-weight="600" fill="#333">v9.0.0</text>
  <line x1="150" y1="112" x2="210" y2="112" stroke="#ccc" stroke-width="2"/>
  <circle cx="230" cy="112" r="14" fill="#eaeaea"/><text x="230" y="117" font-size="13" font-weight="700" fill="#999" text-anchor="middle">2</text>
  <text x="252" y="117" font-size="12" fill="#999">v7.0.0</text>
  <line x1="320" y1="112" x2="380" y2="112" stroke="#ccc" stroke-width="2"/>
  <circle cx="400" cy="112" r="14" fill="#eaeaea"/><text x="400" y="117" font-size="13" font-weight="700" fill="#999" text-anchor="middle">3</text>
  <text x="422" y="117" font-size="12" fill="#999">Review &amp; Save</text>

  <!-- drop zone -->
  <rect x="40" y="150" width="470" height="150" rx="10" fill="#fafafa" stroke="#bdbdbd" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="275" y="212" font-size="15" font-weight="600" fill="#666" text-anchor="middle">Drag &amp; Drop PCF v9.0.0 JSON</text>
  <text x="275" y="236" font-size="12" fill="#999" text-anchor="middle">or click to browse files</text>
  <circle cx="40" cy="150" r="14" fill="#FFA600"/><text x="40" y="155" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">A</text>

  <rect x="532" y="150" width="318" height="150" rx="10" fill="#F5F9EE" stroke="#4CAF50" stroke-width="1.5"/>
  <text x="552" y="178" font-size="13" font-weight="700" fill="#1B5E20">Two ways to fill v9.0.0</text>
  <text x="552" y="202" font-size="12" fill="#444">A · Import your own JSON file, or</text>
  <text x="552" y="224" font-size="12" fill="#444">B · Build it from scratch:</text>
  <rect x="566" y="236" width="260" height="34" rx="8" fill="#ffffff" stroke="#4CAF50"/>
  <text x="696" y="258" font-size="12" font-weight="700" fill="#1B5E20" text-anchor="middle">Open v9.0.0 Form Editor</text>
  <circle cx="566" cy="236" r="12" fill="#FFA600"/><text x="566" y="240" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">B</text>

  <rect x="40" y="330" width="140" height="42" rx="8" fill="#ffffff" stroke="#1B5E20" stroke-width="1.5"/>
  <text x="110" y="356" font-size="13" font-weight="700" fill="#1B5E20" text-anchor="middle">Validate</text>
  <rect x="640" y="330" width="210" height="42" rx="8" fill="#1B5E20"/>
  <text x="745" y="356" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Validate &amp; Continue</text>
  <circle cx="640" cy="330" r="13" fill="#FFA600"/><text x="640" y="335" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <text x="40" y="410" font-size="12" fill="#777">v9.0.0 is the canonical version. Import an existing JSON, or open the Form Editor to build it with</text>
  <text x="40" y="430" font-size="12" fill="#777">the Submodel Creator. Then Validate &amp; Continue to move to v7.0.0.</text>
</svg>
