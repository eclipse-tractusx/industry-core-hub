<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="470" fill="#ffffff"/>
  <rect x="12" y="12" width="876" height="446" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="38" rx="12" fill="#FFA600"/>
  <rect x="12" y="38" width="876" height="12" fill="#FFA600"/>
  <circle cx="36" cy="31" r="5" fill="#ffffff" opacity="0.9"/><circle cx="54" cy="31" r="5" fill="#ffffff" opacity="0.7"/><circle cx="72" cy="31" r="5" fill="#ffffff" opacity="0.5"/>
  <rect x="92" y="19" width="460" height="24" rx="12" fill="#ffffff"/>
  <text x="108" y="36" font-size="12" fill="#666">/ccm-provision</text>
  <rect x="762" y="19" width="114" height="24" rx="12" fill="#ffffff"/>
  <text x="819" y="36" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>

  <text x="40" y="86" font-size="18" font-weight="700" fill="#111">CCM Provision Management</text>
  <text x="40" y="108" font-size="13" fill="#666">Handle incoming certificate requests and provide certificates to your partners</text>

  <!-- top buttons -->
  <rect x="600" y="72" width="130" height="38" rx="8" fill="#ffffff" stroke="#6B3FA0" stroke-width="1.5"/>
  <text x="665" y="96" font-size="12" font-weight="700" fill="#6B3FA0" text-anchor="middle">Send Available</text>
  <rect x="740" y="72" width="110" height="38" rx="8" fill="#6B3FA0"/>
  <text x="795" y="96" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Push Certificate</text>

  <!-- tabs -->
  <rect x="40" y="128" width="180" height="36" rx="8" fill="#F3EDFA" stroke="#9D6FD4" stroke-width="1.5"/>
  <text x="130" y="151" font-size="13" font-weight="700" fill="#6B3FA0" text-anchor="middle">Inbound Requests</text>
  <text x="260" y="151" font-size="13" fill="#999">Shares</text>
  <circle cx="40" cy="128" r="13" fill="#FFA600"/><text x="40" y="133" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <!-- table header -->
  <rect x="40" y="180" width="810" height="32" fill="#f4f2f8"/>
  <text x="58" y="201" font-size="12" font-weight="700" fill="#555">Consumer</text>
  <text x="260" y="201" font-size="12" font-weight="700" fill="#555">Type</text>
  <text x="420" y="201" font-size="12" font-weight="700" fill="#555">Status</text>
  <text x="560" y="201" font-size="12" font-weight="700" fill="#555">Consumer Status</text>
  <text x="760" y="201" font-size="12" font-weight="700" fill="#555">Actions</text>

  <rect x="40" y="212" width="810" height="60" fill="#ffffff" stroke="#eee"/>
  <text x="58" y="238" font-size="13" fill="#333">BPNL0000000CONS</text>
  <text x="58" y="258" font-size="11" fill="#888">bob (consumer)</text>
  <text x="260" y="246" font-size="12" fill="#555">ISO 9001</text>
  <rect x="420" y="230" width="88" height="24" rx="12" fill="#eef"/><text x="464" y="247" font-size="11" font-weight="700" fill="#3a3ab0" text-anchor="middle">Registered</text>
  <text x="560" y="246" font-size="12" fill="#aaa">—</text>
  <rect x="740" y="226" width="100" height="34" rx="8" fill="#ffffff" stroke="#6B3FA0" stroke-width="1.5"/>
  <text x="790" y="248" font-size="13" font-weight="700" fill="#6B3FA0" text-anchor="middle">Provide</text>
  <circle cx="740" cy="226" r="13" fill="#FFA600"/><text x="740" y="231" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <rect x="40" y="300" width="810" height="138" fill="#F3EDFA" stroke="#9D6FD4" stroke-width="1.5" rx="10"/>
  <text x="60" y="328" font-size="13" font-weight="700" fill="#6B3FA0">What this tab is for</text>
  <text x="60" y="352" font-size="12" fill="#444">The Inbound Requests tab lists certificate requests that consumers have sent to you.</text>
  <text x="60" y="374" font-size="12" fill="#444">Click Provide on a row to answer it — you can make the certificate available (pull) or push it directly.</text>
  <text x="60" y="400" font-size="12" fill="#777">Inbound statuses: Registered · Available · Pushed · NotFound.</text>
</svg>
