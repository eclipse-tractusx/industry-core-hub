<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#ffffff"/>
  <rect x="12" y="12" width="876" height="436" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="38" rx="12" fill="#FFA600"/>
  <rect x="12" y="38" width="876" height="12" fill="#FFA600"/>
  <circle cx="36" cy="31" r="5" fill="#ffffff" opacity="0.9"/><circle cx="54" cy="31" r="5" fill="#ffffff" opacity="0.7"/><circle cx="72" cy="31" r="5" fill="#ffffff" opacity="0.5"/>
  <rect x="92" y="19" width="460" height="24" rx="12" fill="#ffffff"/>
  <text x="108" y="36" font-size="12" fill="#666">/catalog</text>
  <rect x="762" y="19" width="114" height="24" rx="12" fill="#ffffff"/>
  <text x="819" y="36" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>

  <text x="40" y="86" font-size="18" font-weight="700" fill="#111">Catalog Parts</text>
  <text x="40" y="108" font-size="13" fill="#666">Provide, share and manage parts at catalog / type level</text>

  <rect x="680" y="72" width="170" height="40" rx="8" fill="#576A8F"/>
  <text x="765" y="97" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">+ Create Catalog Part</text>
  <circle cx="680" cy="72" r="13" fill="#FFA600"/><text x="680" y="77" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <!-- part cards -->
  <rect x="40" y="140" width="250" height="150" rx="10" fill="#ffffff" stroke="#e0e0e0"/>
  <rect x="40" y="140" width="250" height="46" rx="10" fill="#f4f6f9"/>
  <text x="60" y="169" font-size="14" font-weight="700" fill="#333">001-alice-wheel</text>
  <text x="60" y="214" font-size="12" fill="#777">Manufacturer Part ID</text>
  <text x="60" y="232" font-size="12" fill="#333">001-alice-wheel</text>
  <rect x="60" y="250" width="80" height="26" rx="13" fill="#eef" /><text x="100" y="267" font-size="11" fill="#3a3ab0" text-anchor="middle">Draft</text>

  <rect x="310" y="140" width="250" height="150" rx="10" fill="#ffffff" stroke="#e0e0e0"/>
  <rect x="310" y="140" width="250" height="46" rx="10" fill="#f4f6f9"/>
  <text x="330" y="169" font-size="14" font-weight="700" fill="#333">001-alice-rim</text>
  <text x="330" y="214" font-size="12" fill="#777">Manufacturer Part ID</text>
  <text x="330" y="232" font-size="12" fill="#333">001-alice-rim</text>
  <rect x="330" y="250" width="96" height="26" rx="13" fill="#F0F5D5"/><text x="378" y="267" font-size="11" font-weight="700" fill="#5c6b16" text-anchor="middle">Registered</text>

  <rect x="40" y="316" width="810" height="110" fill="#FFF7EC" stroke="#FFA600" stroke-width="1.5" rx="10"/>
  <text x="60" y="344" font-size="13" font-weight="700" fill="#8a5a00">Start here (provider)</text>
  <text x="60" y="368" font-size="12" fill="#444">Click Create Catalog Part to define a new part. Give it a name with your ID (e.g. 001-alice-wheel).</text>
  <text x="60" y="392" font-size="12" fill="#777">A new part starts as Draft — you register and share it in the next steps.</text>
