<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="500" fill="#ffffff"/>
  <rect x="1" y="1" width="898" height="498" fill="none" stroke="#e3e3e3" stroke-width="2" rx="10"/>
  <text x="30" y="46" font-size="23" font-weight="700" fill="#111">CCM — four ways to share a certificate</text>
  <rect x="30" y="58" width="120" height="6" fill="#B3CB2D" rx="3"/>

  <text x="30" y="96" font-size="13" fill="#555">Two questions decide the scenario: <tspan font-weight="700" fill="#6B3FA0">who starts</tspan> the exchange, and <tspan font-weight="700" fill="#6B3FA0">how</tspan> the certificate is delivered.</text>

  <!-- column headers -->
  <rect x="300" y="120" width="270" height="44" rx="8" fill="#F3EDFA"/>
  <text x="435" y="148" font-size="14" font-weight="700" fill="#6B3FA0" text-anchor="middle">AVAILABLE (pull)</text>
  <rect x="585" y="120" width="270" height="44" rx="8" fill="#F3EDFA"/>
  <text x="720" y="148" font-size="14" font-weight="700" fill="#6B3FA0" text-anchor="middle">PUSH (direct)</text>

  <!-- row headers -->
  <rect x="30" y="180" width="255" height="130" rx="8" fill="#F3EDFA"/>
  <text x="157" y="240" font-size="14" font-weight="700" fill="#6B3FA0" text-anchor="middle">RESPONDING</text>
  <text x="157" y="262" font-size="11" fill="#777" text-anchor="middle">provider answers a request</text>
  <rect x="30" y="326" width="255" height="130" rx="8" fill="#F3EDFA"/>
  <text x="157" y="386" font-size="14" font-weight="700" fill="#6B3FA0" text-anchor="middle">SENDING</text>
  <text x="157" y="408" font-size="11" fill="#777" text-anchor="middle">provider sends, no request</text>

  <!-- cells -->
  <rect x="300" y="180" width="270" height="130" rx="8" fill="#ffffff" stroke="#d9c9ee" stroke-width="1.5"/>
  <text x="320" y="212" font-size="15" font-weight="700" fill="#333">Scenario 1</text>
  <text x="320" y="236" font-size="12" fill="#666">Consumer requests →</text>
  <text x="320" y="254" font-size="12" fill="#666">provider makes it available →</text>
  <text x="320" y="272" font-size="12" fill="#666">consumer pulls &amp; opens it.</text>
  <text x="320" y="296" font-size="11" fill="#9D6FD4" font-weight="700">Cert name: 001-alice</text>

  <rect x="585" y="180" width="270" height="130" rx="8" fill="#ffffff" stroke="#d9c9ee" stroke-width="1.5"/>
  <text x="605" y="212" font-size="15" font-weight="700" fill="#333">Scenario 2</text>
  <text x="605" y="236" font-size="12" fill="#666">Consumer requests →</text>
  <text x="605" y="254" font-size="12" fill="#666">provider pushes directly →</text>
  <text x="605" y="272" font-size="12" fill="#666">consumer opens it (no pull).</text>
  <text x="605" y="296" font-size="11" fill="#9D6FD4" font-weight="700">Cert name: 001-alice.2</text>

  <rect x="300" y="326" width="270" height="130" rx="8" fill="#ffffff" stroke="#d9c9ee" stroke-width="1.5"/>
  <text x="320" y="358" font-size="15" font-weight="700" fill="#333">Scenario 3</text>
  <text x="320" y="382" font-size="12" fill="#666">Provider sends "available" →</text>
  <text x="320" y="400" font-size="12" fill="#666">consumer pulls &amp; opens it.</text>
  <text x="320" y="424" font-size="12" fill="#666">No request needed.</text>
  <text x="320" y="446" font-size="11" fill="#9D6FD4" font-weight="700">Cert name: 001-alice.3</text>

  <rect x="585" y="326" width="270" height="130" rx="8" fill="#ffffff" stroke="#d9c9ee" stroke-width="1.5"/>
  <text x="605" y="358" font-size="15" font-weight="700" fill="#333">Scenario 4</text>
  <text x="605" y="382" font-size="12" fill="#666">Provider pushes directly →</text>
  <text x="605" y="400" font-size="12" fill="#666">consumer opens it (no pull).</text>
  <text x="605" y="424" font-size="12" fill="#666">No request needed.</text>
  <text x="605" y="446" font-size="11" fill="#9D6FD4" font-weight="700">Cert name: 001-alice.4</text>
</svg>
