<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="470" fill="#ffffff"/>
  <rect x="12" y="12" width="876" height="446" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="38" rx="12" fill="#B3CB2D"/>
  <rect x="12" y="38" width="876" height="12" fill="#B3CB2D"/>
  <circle cx="36" cy="31" r="5" fill="#ffffff" opacity="0.9"/><circle cx="54" cy="31" r="5" fill="#ffffff" opacity="0.7"/><circle cx="72" cy="31" r="5" fill="#ffffff" opacity="0.5"/>
  <rect x="92" y="19" width="460" height="24" rx="12" fill="#ffffff"/>
  <text x="108" y="36" font-size="12" fill="#666">/ccm-consumption</text>
  <rect x="760" y="19" width="116" height="24" rx="12" fill="#ffffff"/>
  <text x="818" y="36" font-size="11" font-weight="700" fill="#5c6b16" text-anchor="middle">CONSUMER</text>

  <text x="40" y="86" font-size="18" font-weight="700" fill="#111">CCM Consumption</text>
  <text x="40" y="108" font-size="13" fill="#666">Request, track, download and review certificates from your partners</text>

  <rect x="710" y="72" width="140" height="38" rx="8" fill="#6B3FA0"/>
  <text x="780" y="96" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">+ New Request</text>
  <circle cx="710" cy="72" r="13" fill="#FFA600"/><text x="710" y="77" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <!-- table header -->
  <rect x="40" y="140" width="810" height="32" fill="#f4f2f8"/>
  <text x="58" y="161" font-size="12" font-weight="700" fill="#555">Provider</text>
  <text x="250" y="161" font-size="12" font-weight="700" fill="#555">Type</text>
  <text x="400" y="161" font-size="12" font-weight="700" fill="#555">Status</text>
  <text x="540" y="161" font-size="12" font-weight="700" fill="#555">Response</text>
  <text x="700" y="161" font-size="12" font-weight="700" fill="#555">Actions</text>

  <rect x="40" y="172" width="810" height="60" fill="#ffffff" stroke="#eee"/>
  <text x="58" y="200" font-size="12" fill="#555">alice (provider)</text>
  <text x="250" y="206" font-size="12" fill="#555">ISO 9001</text>
  <rect x="400" y="190" width="70" height="24" rx="12" fill="#F0F5D5"/><text x="435" y="207" font-size="11" font-weight="700" fill="#5c6b16" text-anchor="middle">Found</text>
  <rect x="540" y="190" width="80" height="24" rx="12" fill="#FFF0D6"/><text x="580" y="207" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">Pending</text>
  <!-- action icons -->
  <circle cx="705" cy="202" r="15" fill="#f0edf6" stroke="#9D6FD4"/><text x="705" y="207" font-size="12" fill="#6B3FA0" text-anchor="middle">⭳</text>
  <circle cx="745" cy="202" r="15" fill="#f0edf6" stroke="#9D6FD4"/><text x="745" y="207" font-size="11" fill="#6B3FA0" text-anchor="middle">👁</text>
  <circle cx="785" cy="202" r="15" fill="#f0edf6" stroke="#9D6FD4"/><text x="785" y="207" font-size="11" fill="#6B3FA0" text-anchor="middle">✎</text>
  <circle cx="705" cy="180" r="11" fill="#FFA600"/><text x="705" y="184" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <circle cx="785" cy="180" r="11" fill="#FFA600"/><text x="785" y="184" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">3</text>

  <text x="700" y="250" font-size="10" fill="#888">pull · view · feedback</text>

  <rect x="40" y="270" width="810" height="168" fill="#F3EDFA" stroke="#9D6FD4" stroke-width="1.5" rx="10"/>
  <text x="60" y="298" font-size="13" font-weight="700" fill="#6B3FA0">The consumer flow</text>
  <text x="60" y="324" font-size="12" fill="#444">1. New Request — pick the provider, certified BPN and certificate type, then send.</text>
  <text x="60" y="348" font-size="12" fill="#444">2. Pull (⭳) when the status is Found and it was made "available"; a push arrives ready to view.</text>
  <text x="60" y="372" font-size="12" fill="#444">3. View (👁) opens the PDF; then send feedback (✎): RECEIVED, ACCEPTED or REJECTED.</text>
  <text x="60" y="400" font-size="12" fill="#777">Request statuses: Pending · Found · NotFound · Failed.</text>
  <text x="60" y="422" font-size="12" fill="#777">A REJECTED feedback asks you to describe the certificate and location errors.</text>
</svg>
