<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="470" fill="#ffffff"/>
  <rect x="1" y="1" width="898" height="468" fill="none" stroke="#e3e3e3" stroke-width="2" rx="10"/>
  <text x="30" y="46" font-size="24" font-weight="700" fill="#111111">PCF — two ways to exchange carbon footprint data</text>
  <rect x="30" y="60" width="120" height="6" fill="#B3CB2D" rx="3"/>

  <!-- SYNC row -->
  <rect x="30" y="90" width="840" height="150" fill="#F5F9EE" stroke="#4CAF50" stroke-width="1.5" rx="12"/>
  <rect x="30" y="90" width="8" height="150" fill="#4CAF50" rx="4"/>
  <text x="56" y="120" font-size="18" font-weight="700" fill="#1B5E20">SYNC — publish directly on a shared part</text>
  <text x="56" y="142" font-size="13" fill="#555">The provider attaches PCF data to a catalog part and shares it. The consumer discovers the part and reads the PCF immediately.</text>

  <!-- sync provider box -->
  <rect x="70" y="160" width="230" height="60" fill="#ffffff" stroke="#1d4ed8" stroke-width="1.5" rx="8"/>
  <text x="185" y="184" font-size="13" font-weight="700" fill="#1d4ed8" text-anchor="middle">PROVIDER</text>
  <text x="185" y="204" font-size="12" fill="#333" text-anchor="middle">Catalog Part + PCF submodel</text>
  <!-- arrow -->
  <line x1="305" y1="190" x2="380" y2="190" stroke="#888" stroke-width="2" marker-end="url(#ah)"/>
  <text x="342" y="182" font-size="11" fill="#777" text-anchor="middle">share</text>
  <!-- sync consumer box -->
  <rect x="385" y="160" width="230" height="60" fill="#ffffff" stroke="#15803d" stroke-width="1.5" rx="8"/>
  <text x="500" y="184" font-size="13" font-weight="700" fill="#15803d" text-anchor="middle">CONSUMER</text>
  <text x="500" y="204" font-size="12" fill="#333" text-anchor="middle">Dataspace Discovery → read PCF</text>
  <line x1="620" y1="190" x2="695" y2="190" stroke="#888" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="700" y="168" width="150" height="44" fill="#F0F5D5" stroke="#B3CB2D" stroke-width="1.5" rx="8"/>
  <text x="775" y="195" font-size="12" font-weight="700" fill="#5c6b16" text-anchor="middle">Reads data instantly</text>

  <!-- ASYNC row -->
  <rect x="30" y="260" width="840" height="180" fill="#FFF7EC" stroke="#FFA600" stroke-width="1.5" rx="12"/>
  <rect x="30" y="260" width="8" height="180" fill="#FFA600" rx="4"/>
  <text x="56" y="290" font-size="18" font-weight="700" fill="#8a5a00">ASYNC — request, accept, receive</text>
  <text x="56" y="312" font-size="13" fill="#555">The consumer requests a subpart's PCF; the provider accepts the request; the consumer receives the data back.</text>

  <rect x="60" y="332" width="180" height="66" fill="#ffffff" stroke="#15803d" stroke-width="1.5" rx="8"/>
  <text x="150" y="356" font-size="12" font-weight="700" fill="#15803d" text-anchor="middle">CONSUMER</text>
  <text x="150" y="374" font-size="11" fill="#333" text-anchor="middle">PCF Precalculation</text>
  <text x="150" y="389" font-size="11" fill="#333" text-anchor="middle">request subpart</text>

  <line x1="245" y1="365" x2="315" y2="365" stroke="#888" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="320" y="332" width="180" height="66" fill="#ffffff" stroke="#1d4ed8" stroke-width="1.5" rx="8"/>
  <text x="410" y="356" font-size="12" font-weight="700" fill="#1d4ed8" text-anchor="middle">PROVIDER</text>
  <text x="410" y="374" font-size="11" fill="#333" text-anchor="middle">PCF Requests</text>
  <text x="410" y="389" font-size="11" fill="#333" text-anchor="middle">accept request</text>

  <line x1="505" y1="365" x2="575" y2="365" stroke="#888" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="580" y="332" width="180" height="66" fill="#ffffff" stroke="#15803d" stroke-width="1.5" rx="8"/>
  <text x="670" y="356" font-size="12" font-weight="700" fill="#15803d" text-anchor="middle">CONSUMER</text>
  <text x="670" y="374" font-size="11" fill="#333" text-anchor="middle">status: Received</text>
  <text x="670" y="389" font-size="11" fill="#333" text-anchor="middle">download PCF</text>

  <defs>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>
</svg>
