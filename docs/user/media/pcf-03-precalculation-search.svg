<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="470" fill="#ffffff"/>
  <rect x="12" y="12" width="876" height="446" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="38" rx="12" fill="#B3CB2D"/>
  <rect x="12" y="38" width="876" height="12" fill="#B3CB2D"/>
  <circle cx="36" cy="31" r="5" fill="#ffffff" opacity="0.9"/><circle cx="54" cy="31" r="5" fill="#ffffff" opacity="0.7"/><circle cx="72" cy="31" r="5" fill="#ffffff" opacity="0.5"/>
  <rect x="92" y="19" width="460" height="24" rx="12" fill="#ffffff"/>
  <text x="108" y="36" font-size="12" fill="#666">/pcf/precalculation</text>
  <rect x="760" y="19" width="116" height="24" rx="12" fill="#ffffff"/>
  <text x="818" y="36" font-size="11" font-weight="700" fill="#5c6b16" text-anchor="middle">CONSUMER</text>

  <text x="40" y="96" font-size="22" font-weight="700" fill="#111">PCF Precalculation</text>
  <text x="40" y="122" font-size="14" fill="#666">Calculate Product Carbon Footprint from subpart PCF data collected from your suppliers</text>

  <!-- search field -->
  <rect x="40" y="170" width="560" height="52" rx="8" fill="#f7f7f7" stroke="#cfcfcf" stroke-width="1.5"/>
  <text x="60" y="202" font-size="14" fill="#9a9a9a">Enter Manufacturer Part ID...</text>
  <text x="60" y="160" font-size="12" fill="#8a8a8a">Manufacturer Part ID</text>

  <!-- example typed -->
  <text x="60" y="202" font-size="14" fill="#9a9a9a"></text>

  <!-- button -->
  <rect x="616" y="170" width="150" height="52" rx="8" fill="#1B5E20"/>
  <text x="691" y="202" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Calculate PCF</text>

  <circle cx="40" cy="196" r="14" fill="#FFA600"/><text x="40" y="201" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <circle cx="766" cy="170" r="14" fill="#FFA600"/><text x="766" y="175" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <rect x="40" y="270" width="726" height="150" fill="#F5F9EE" stroke="#4CAF50" stroke-width="1.5" rx="10"/>
  <text x="64" y="300" font-size="14" font-weight="700" fill="#1B5E20">What happens next</text>
  <text x="64" y="326" font-size="13" fill="#444">1. Type the Manufacturer Part ID of your own part (use your ID, e.g. 001-alice-wheel).</text>
  <text x="64" y="350" font-size="13" fill="#444">2. Click Calculate PCF — the part opens and you can start adding its subparts.</text>
  <text x="64" y="386" font-size="13" fill="#777">The part must already exist and be registered in your Catalog Parts.</text>
</svg>
