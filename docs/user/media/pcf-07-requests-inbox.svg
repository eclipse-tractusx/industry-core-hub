  <rect x="40" y="410" width="815" height="66" fill="#FFF7EC" stroke="#FFA600" stroke-width="1.5" rx="10"/>
  <text x="60" y="436" font-size="12" fill="#8a5a00">Requests appear as cards. If <tspan font-weight="700">Accept</tspan> is disabled (PCF location not resolved), create the PCF data in</text>
