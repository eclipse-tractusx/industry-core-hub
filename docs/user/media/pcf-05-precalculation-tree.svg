  <!-- paper-plane send icon button -->
  <rect x="802" y="371" width="34" height="28" rx="7" fill="#1B5E20"/>
  <path d="M809,385 L831,378 L820,397 L817,388 Z" fill="#ffffff"/>
  <circle cx="802" cy="371" r="11" fill="#FFA600"/><text x="802" y="375" font-size="10" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <!-- ghost add -->
  <rect x="84" y="410" width="766" height="30" rx="8" fill="#fafafa" stroke="#d8d8d8" stroke-dasharray="6 5"/>
  <text x="461" y="430" font-size="12" fill="#999" text-anchor="middle">＋ Add Subpart Relation</text>

  <text x="40" y="470" font-size="12" fill="#777">Each subpart shows: supplier · part ID · status · PCF value · action. ② The paper-plane sends a Pending request;</text>
  <text x="40" y="488" font-size="12" fill="#777">③ click a Delivered / Received row to expand its PCF Details. ④ Download JSON once all are collected.</text>
