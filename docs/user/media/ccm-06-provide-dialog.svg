<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="470" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="470" fill="#0f1b33" opacity="0.06"/>
  <rect x="210" y="35" width="480" height="400" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <text x="240" y="74" font-size="18" font-weight="700" fill="#111">Provide Certificate</text>
  <rect x="556" y="54" width="92" height="24" rx="12" fill="#FFF0D6" stroke="#FFA600"/>
  <text x="602" y="71" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>
  <rect x="240" y="86" width="70" height="4" fill="#B3CB2D" rx="2"/>
  <text x="240" y="112" font-size="12" fill="#777">Respond to bob requesting ISO 9001</text>

  <!-- mode toggle -->
  <text x="240" y="150" font-size="12" font-weight="600" fill="#333">Choose how to deliver</text>
  <rect x="240" y="160" width="200" height="50" rx="8" fill="#F3EDFA" stroke="#6B3FA0" stroke-width="2"/>
  <text x="340" y="182" font-size="13" font-weight="700" fill="#6B3FA0" text-anchor="middle">Make available</text>
  <text x="340" y="200" font-size="11" fill="#6B3FA0" text-anchor="middle">(PULL)</text>
  <circle cx="440" cy="160" r="12" fill="#FFA600"/><text x="440" y="164" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <rect x="452" y="160" width="200" height="50" rx="8" fill="#ffffff" stroke="#cfcfcf" stroke-width="1.5"/>
  <text x="552" y="182" font-size="13" font-weight="600" fill="#555" text-anchor="middle">Push directly</text>
  <text x="552" y="200" font-size="11" fill="#888" text-anchor="middle">(PUSH)</text>

  <text x="240" y="248" font-size="12" font-weight="600" fill="#333">Certificate to provide</text>
  <rect x="240" y="256" width="412" height="42" rx="8" fill="#f7f7f7" stroke="#cfcfcf"/>
  <text x="256" y="282" font-size="13" fill="#333">001-alice — ISO 9001</text>
  <circle cx="652" cy="277" r="12" fill="#FFA600"/><text x="652" y="281" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <rect x="240" y="316" width="412" height="42" rx="8" fill="#FFF7EC" stroke="#FFA600"/>
  <text x="256" y="342" font-size="11" fill="#8a5a00">Not published yet — it will be published automatically first.</text>

  <rect x="450" y="382" width="90" height="38" rx="8" fill="#ffffff" stroke="#c0c0c0"/><text x="495" y="406" font-size="13" fill="#555" text-anchor="middle">Cancel</text>
  <rect x="550" y="382" width="102" height="38" rx="8" fill="#6B3FA0"/><text x="601" y="406" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">Send Availability</text>
  <circle cx="652" cy="382" r="12" fill="#FFA600"/><text x="652" y="386" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
</svg>
