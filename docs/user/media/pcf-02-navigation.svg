<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="520" fill="#ffffff"/>
  <!-- window -->
  <rect x="12" y="12" width="876" height="496" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="40" rx="12" fill="#012060"/>
  <rect x="12" y="40" width="876" height="12" fill="#012060"/>
  <circle cx="36" cy="32" r="6" fill="#ff5f57"/><circle cx="56" cy="32" r="6" fill="#febc2e"/><circle cx="76" cy="32" r="6" fill="#28c840"/>
  <text x="450" y="37" font-size="14" font-weight="600" fill="#ffffff" text-anchor="middle">Industry Core Hub</text>

  <!-- sidebar -->
  <rect x="12" y="52" width="250" height="456" fill="#f7f8fa"/>
  <line x1="262" y1="52" x2="262" y2="508" stroke="#e3e3e3" stroke-width="1.5"/>

  <!-- Industry Core group -->
  <text x="34" y="82" font-size="11" font-weight="700" fill="#8a8a8a" letter-spacing="1">INDUSTRY CORE</text>
  <text x="44" y="106" font-size="13" fill="#333">Catalog Parts</text>
  <text x="44" y="130" font-size="13" fill="#333">Dataspace Discovery</text>

  <text x="34" y="162" font-size="11" font-weight="700" fill="#8a8a8a" letter-spacing="1">BUSINESS PARTNER</text>
  <text x="44" y="186" font-size="13" fill="#333">Contact List</text>

  <!-- PCF group highlighted -->
  <rect x="24" y="204" width="226" height="112" fill="#F5F9EE" stroke="#4CAF50" stroke-width="1.5" rx="8"/>
  <text x="34" y="226" font-size="11" font-weight="700" fill="#1B5E20" letter-spacing="1">PCF</text>
  <text x="44" y="252" font-size="13" font-weight="600" fill="#1B5E20">PCF Precalculation</text>
  <text x="44" y="278" font-size="13" font-weight="600" fill="#1B5E20">PCF Management</text>
  <text x="44" y="304" font-size="13" font-weight="600" fill="#1B5E20">PCF Requests</text>

  <text x="34" y="346" font-size="11" font-weight="700" fill="#8a8a8a" letter-spacing="1">CCM</text>
  <text x="44" y="370" font-size="13" fill="#999">Certificate Management</text>
  <text x="44" y="394" font-size="13" fill="#999">CCM Provision Management</text>
  <text x="44" y="418" font-size="13" fill="#999">CCM Consumption</text>

  <!-- callouts -->
  <circle cx="240" cy="252" r="12" fill="#FFA600"/><text x="240" y="256" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <circle cx="240" cy="278" r="12" fill="#FFA600"/><text x="240" y="282" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <circle cx="240" cy="304" r="12" fill="#FFA600"/><text x="240" y="308" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>

  <!-- main content -->
  <text x="300" y="90" font-size="20" font-weight="700" fill="#111">The PCF KIT — three screens</text>
  <rect x="300" y="100" width="90" height="5" fill="#B3CB2D" rx="3"/>

  <circle cx="316" cy="150" r="13" fill="#FFA600"/><text x="316" y="155" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="340" y="147" font-size="15" font-weight="700" fill="#333">PCF Precalculation</text>
  <text x="340" y="167" font-size="13" fill="#666">Consumer side — request the PCF of subparts from your suppliers.</text>

  <circle cx="316" cy="215" r="13" fill="#FFA600"/><text x="316" y="220" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="340" y="212" font-size="15" font-weight="700" fill="#333">PCF Management</text>
  <text x="340" y="232" font-size="13" fill="#666">Provider side — upload and manage the PCF data of your parts.</text>

  <circle cx="316" cy="280" r="13" fill="#FFA600"/><text x="316" y="285" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">3</text>
  <text x="340" y="277" font-size="15" font-weight="700" fill="#333">PCF Requests</text>
  <text x="340" y="297" font-size="13" fill="#666">Provider side — review and accept incoming PCF requests.</text>

  <rect x="300" y="340" width="560" height="150" fill="#FFF7EC" stroke="#FFA600" stroke-width="1.5" rx="10"/>
  <text x="320" y="368" font-size="13" font-weight="700" fill="#8a5a00">Tip</text>
  <text x="320" y="392" font-size="13" fill="#555">If the PCF group is not visible in the sidebar, open the KIT Features</text>
  <text x="320" y="412" font-size="13" fill="#555">button at the bottom and enable the PCF KIT first.</text>
</svg>
