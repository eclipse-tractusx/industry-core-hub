<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="480" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="480" fill="#0f1b33" opacity="0.06"/>
  <rect x="180" y="30" width="540" height="420" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <text x="210" y="68" font-size="18" font-weight="700" fill="#111">Upload Certificate</text>
  <rect x="584" y="48" width="92" height="24" rx="12" fill="#FFF0D6" stroke="#FFA600"/>
  <text x="630" y="65" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>
  <rect x="210" y="80" width="70" height="4" fill="#B3CB2D" rx="2"/>

  <!-- stepper -->
  <circle cx="240" cy="118" r="14" fill="#6B3FA0"/><text x="240" y="123" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">1</text>
  <text x="262" y="123" font-size="12" font-weight="600" fill="#333">Details</text>
  <line x1="330" y1="118" x2="380" y2="118" stroke="#ccc" stroke-width="2"/>
  <circle cx="400" cy="118" r="14" fill="#eaeaea"/><text x="400" y="123" font-size="13" font-weight="700" fill="#999" text-anchor="middle">2</text>
  <text x="422" y="123" font-size="12" fill="#999">Validity</text>
  <line x1="480" y1="118" x2="530" y2="118" stroke="#ccc" stroke-width="2"/>
  <circle cx="550" cy="118" r="14" fill="#eaeaea"/><text x="550" y="123" font-size="13" font-weight="700" fill="#999" text-anchor="middle">3</text>
  <text x="572" y="123" font-size="12" fill="#999">File (PDF)</text>

  <text x="210" y="168" font-size="12" font-weight="600" fill="#333">Certificate Type *</text>
  <rect x="210" y="176" width="480" height="40" rx="8" fill="#f7f7f7" stroke="#cfcfcf"/>
  <text x="226" y="201" font-size="13" fill="#9a9a9a">Search or type a certificate type (e.g. ISO 9001)</text>
  <circle cx="690" cy="196" r="12" fill="#FFA600"/><text x="690" y="200" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <text x="210" y="242" font-size="12" font-weight="600" fill="#333">Certificate Name</text>
  <rect x="210" y="250" width="480" height="40" rx="8" fill="#f7f7f7" stroke="#cfcfcf"/>
  <text x="226" y="275" font-size="13" fill="#333">001-alice</text>
  <circle cx="690" cy="270" r="12" fill="#FFA600"/><text x="690" y="274" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <text x="210" y="316" font-size="12" font-weight="600" fill="#333">Issuer / Certification Body *</text>
  <rect x="210" y="324" width="480" height="40" rx="8" fill="#f7f7f7" stroke="#cfcfcf"/>
  <text x="226" y="349" font-size="13" fill="#9a9a9a">e.g. DEKRA, TÜV SÜD</text>
  <circle cx="690" cy="344" r="12" fill="#FFA600"/><text x="690" y="348" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>

  <rect x="500" y="396" width="80" height="38" rx="8" fill="#ffffff" stroke="#c0c0c0"/><text x="540" y="420" font-size="13" fill="#555" text-anchor="middle">Cancel</text>
  <rect x="590" y="396" width="100" height="38" rx="8" fill="#6B3FA0"/><text x="640" y="420" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Next</text>
  <circle cx="690" cy="396" r="12" fill="#FFA600"/><text x="690" y="400" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">4</text>
</svg>
