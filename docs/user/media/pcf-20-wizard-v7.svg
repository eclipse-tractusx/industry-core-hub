<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="460" fill="#ffffff"/>
  <rect x="12" y="12" width="876" height="436" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="38" rx="12" fill="#FFA600"/>
  <rect x="12" y="38" width="876" height="12" fill="#FFA600"/>
  <circle cx="36" cy="31" r="5" fill="#ffffff" opacity="0.9"/><circle cx="54" cy="31" r="5" fill="#ffffff" opacity="0.7"/><circle cx="72" cy="31" r="5" fill="#ffffff" opacity="0.5"/>
  <rect x="92" y="19" width="460" height="24" rx="12" fill="#ffffff"/>
  <text x="108" y="36" font-size="12" fill="#666">/pcf/management</text>
  <rect x="762" y="19" width="114" height="24" rx="12" fill="#ffffff"/>
  <text x="819" y="36" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>

  <text x="40" y="82" font-size="16" font-weight="700" fill="#111">Dual PCF Creation — Step 2: Create PCF v7.0.0</text>

  <circle cx="60" cy="112" r="14" fill="#B3CB2D"/><text x="60" y="117" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">&#10003;</text>
  <text x="82" y="117" font-size="12" fill="#777">v9.0.0</text>
  <line x1="150" y1="112" x2="210" y2="112" stroke="#B3CB2D" stroke-width="2"/>
  <circle cx="230" cy="112" r="14" fill="#1B5E20"/><text x="230" y="117" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">2</text>
  <text x="252" y="117" font-size="12" font-weight="600" fill="#333">v7.0.0</text>
  <line x1="320" y1="112" x2="380" y2="112" stroke="#ccc" stroke-width="2"/>
  <circle cx="400" cy="112" r="14" fill="#eaeaea"/><text x="400" y="117" font-size="13" font-weight="700" fill="#999" text-anchor="middle">3</text>
  <text x="422" y="117" font-size="12" fill="#999">Review &amp; Save</text>

  <rect x="40" y="150" width="810" height="70" rx="10" fill="#E1F1FF" stroke="#4D73D5" stroke-width="1.5"/>
  <text x="60" y="180" font-size="13" font-weight="700" fill="#2B4078">Pre-filled from v9.0.0</text>
  <text x="60" y="202" font-size="12" fill="#33507a">The v7.0.0 form already contains the values from v9.0.0. You only adjust what differs.</text>
  <circle cx="40" cy="150" r="13" fill="#FFA600"/><text x="40" y="155" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <rect x="40" y="240" width="470" height="120" rx="10" fill="#fafafa" stroke="#bdbdbd" stroke-width="2" stroke-dasharray="7 6"/>
  <text x="275" y="292" font-size="14" font-weight="600" fill="#666" text-anchor="middle">Drag &amp; Drop PCF v7.0.0 JSON</text>
  <text x="275" y="314" font-size="12" fill="#999" text-anchor="middle">or open the v7.0.0 Form Editor</text>

  <rect x="532" y="240" width="318" height="120" rx="10" fill="#F5F9EE" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="552" y="262" width="180" height="32" rx="8" fill="#ffffff" stroke="#4CAF50"/>
  <text x="642" y="283" font-size="12" font-weight="700" fill="#1B5E20" text-anchor="middle">Refresh from v9.0.0</text>
  <text x="552" y="322" font-size="11" fill="#444">Re-copies v9.0.0 values if you</text>
  <text x="552" y="338" font-size="11" fill="#444">changed them and want to reset.</text>
  <circle cx="552" cy="262" r="12" fill="#FFA600"/><text x="552" y="266" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <rect x="40" y="378" width="120" height="42" rx="8" fill="#ffffff" stroke="#c0c0c0"/>
  <text x="100" y="404" font-size="13" fill="#555" text-anchor="middle">Back to v9.0.0</text>
  <rect x="700" y="378" width="150" height="42" rx="8" fill="#1B5E20"/>
  <text x="775" y="404" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Continue</text>
  <circle cx="700" cy="378" r="13" fill="#FFA600"/><text x="700" y="383" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">3</text>
