<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="400" fill="#0f1b33" opacity="0.06"/>
  <rect x="250" y="40" width="400" height="320" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <text x="280" y="78" font-size="17" font-weight="700" fill="#111">Notify Participants</text>
  <rect x="280" y="90" width="70" height="4" fill="#B3CB2D" rx="2"/>
  <rect x="548" y="58" width="86" height="24" rx="12" fill="#FFF0D6" stroke="#FFA600"/>
  <text x="591" y="75" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>

  <text x="280" y="122" font-size="12" fill="#666">Select participants to notify about this PCF update</text>

  <rect x="280" y="140" width="340" height="44" rx="8" fill="#F5F9EE" stroke="#4CAF50"/>
  <text x="296" y="167" font-size="12" fill="#1B5E20">1 participant interested in this PCF data</text>

  <rect x="280" y="196" width="18" height="18" rx="4" fill="#4CAF50"/>
  <text x="292" y="210" font-size="12" fill="#fff" text-anchor="middle">✓</text>
  <text x="310" y="210" font-size="13" fill="#333">bob — BPNL0000000CONS</text>

  <rect x="280" y="308" width="90" height="38" rx="8" fill="#ffffff" stroke="#c0c0c0"/><text x="325" y="332" font-size="13" fill="#555" text-anchor="middle">Skip</text>
  <rect x="440" y="308" width="180" height="38" rx="8" fill="#1B5E20"/><text x="530" y="332" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Send PCF Update</text>
  <circle cx="620" cy="308" r="12" fill="#FFA600"/><text x="620" y="312" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <text x="280" y="272" font-size="11" fill="#999">Consumers who requested this PCF get notified of the new values.</text>
</svg>
