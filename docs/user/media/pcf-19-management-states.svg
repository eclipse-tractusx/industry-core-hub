<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="400" fill="#ffffff"/>
  <rect x="1" y="1" width="898" height="398" fill="none" stroke="#e3e3e3" stroke-width="2" rx="10"/>
  <text x="30" y="44" font-size="18" font-weight="700" fill="#111">PCF Management — the three states of a part</text>
  <rect x="30" y="54" width="120" height="6" fill="#B3CB2D" rx="3"/>

  <!-- state 1 -->
  <rect x="30" y="80" width="270" height="270" rx="12" fill="#ffffff" stroke="#e0e0e0"/>
  <rect x="30" y="80" width="270" height="40" rx="12" fill="#EDEFF2"/>
  <text x="165" y="106" font-size="13" font-weight="700" fill="#444" text-anchor="middle">1 · Not registered</text>
  <rect x="52" y="140" width="226" height="120" rx="8" fill="#f7f8fa" stroke="#dcdcdc"/>
  <text x="165" y="180" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Register Your</text>
  <text x="165" y="200" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Catalog Part</text>
  <rect x="92" y="216" width="146" height="30" rx="8" fill="#576A8F"/>
  <text x="165" y="236" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Go to Catalog Mgmt</text>
  <text x="165" y="292" font-size="11" fill="#777" text-anchor="middle">The part is still a draft.</text>
  <text x="165" y="310" font-size="11" fill="#777" text-anchor="middle">Register it first.</text>

  <!-- state 2 -->
  <rect x="315" y="80" width="270" height="270" rx="12" fill="#ffffff" stroke="#FFA600" stroke-width="1.5"/>
  <rect x="315" y="80" width="270" height="40" rx="12" fill="#FFF7EC"/>
  <text x="450" y="106" font-size="13" font-weight="700" fill="#8a5a00" text-anchor="middle">2 · Registered, no PCF</text>
  <rect x="337" y="140" width="226" height="120" rx="8" fill="#FFFCF5" stroke="#FFE1A8"/>
  <text x="450" y="184" font-size="13" font-weight="700" fill="#333" text-anchor="middle">Upload PCF Data</text>
  <rect x="377" y="210" width="146" height="30" rx="8" fill="#1B5E20"/>
  <text x="450" y="230" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">Upload PCF Data</text>
  <text x="450" y="292" font-size="11" fill="#8a5a00" text-anchor="middle">Most likely your case if</text>
  <text x="450" y="310" font-size="11" fill="#8a5a00" text-anchor="middle">you followed the guide.</text>

  <!-- state 3 -->
  <rect x="600" y="80" width="270" height="270" rx="12" fill="#ffffff" stroke="#4CAF50" stroke-width="1.5"/>
  <rect x="600" y="80" width="270" height="40" rx="12" fill="#F5F9EE"/>
  <text x="735" y="106" font-size="13" font-weight="700" fill="#1B5E20" text-anchor="middle">3 · PCF registered</text>
  <rect x="622" y="140" width="106" height="56" rx="8" fill="#F0F5D5" stroke="#B3CB2D"/>
  <text x="675" y="164" font-size="11" fill="#5c6b16" text-anchor="middle">v9.0.0</text>
  <text x="675" y="182" font-size="11" font-weight="700" fill="#5c6b16" text-anchor="middle">UPLOADED</text>
  <rect x="740" y="140" width="108" height="56" rx="8" fill="#F0F5D5" stroke="#B3CB2D"/>
  <text x="794" y="164" font-size="11" fill="#5c6b16" text-anchor="middle">v7.0.0</text>
  <text x="794" y="182" font-size="11" font-weight="700" fill="#5c6b16" text-anchor="middle">UPLOADED</text>
  <rect x="622" y="210" width="226" height="30" rx="8" fill="#ffffff" stroke="#4CAF50"/>
  <text x="735" y="230" font-size="11" font-weight="700" fill="#1B5E20" text-anchor="middle">Update / Complete PCF</text>
  <text x="735" y="292" font-size="11" fill="#1B5E20" text-anchor="middle">The goal: both versions</text>
  <text x="735" y="310" font-size="11" fill="#1B5E20" text-anchor="middle">uploaded and shareable.</text>
</svg>
