  <rect x="560" y="386" width="90" height="38" rx="8" fill="#576A8F"/><text x="605" y="410" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Create</text>
  <circle cx="650" cy="386" r="12" fill="#FFA600"/><text x="650" y="390" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">3</text>
