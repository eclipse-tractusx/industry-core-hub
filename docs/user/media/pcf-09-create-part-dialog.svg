<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="470" fill="#ffffff"/>
  <rect x="0" y="0" width="900" height="470" fill="#0f1b33" opacity="0.06"/>
  <rect x="220" y="30" width="460" height="410" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <text x="250" y="68" font-size="18" font-weight="700" fill="#111">Create New Catalog Part</text>
  <rect x="574" y="48" width="92" height="24" rx="12" fill="#FFF0D6" stroke="#FFA600"/>
  <text x="620" y="65" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>
  <rect x="250" y="80" width="70" height="4" fill="#B3CB2D" rx="2"/>

  <text x="250" y="116" font-size="12" font-weight="600" fill="#333">Manufacturer Part ID *</text>
  <rect x="250" y="124" width="400" height="40" rx="8" fill="#f7f7f7" stroke="#cfcfcf"/>
  <text x="266" y="149" font-size="13" fill="#333">001-alice-wheel</text>
  <circle cx="650" cy="144" r="12" fill="#FFA600"/><text x="650" y="148" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <text x="250" y="188" font-size="12" font-weight="600" fill="#333">Part Name *</text>
  <rect x="250" y="196" width="400" height="40" rx="8" fill="#f7f7f7" stroke="#cfcfcf"/>
  <text x="266" y="221" font-size="13" fill="#333">001-alice Wheel</text>
  <circle cx="650" cy="216" r="12" fill="#FFA600"/><text x="650" y="220" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">2</text>

  <text x="250" y="260" font-size="12" font-weight="600" fill="#333">Category</text>
