<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <rect width="900" height="470" fill="#ffffff"/>
  <rect x="12" y="12" width="876" height="446" rx="12" fill="#ffffff" stroke="#dcdcdc" stroke-width="2"/>
  <rect x="12" y="12" width="876" height="38" rx="12" fill="#FFA600"/>
  <rect x="12" y="38" width="876" height="12" fill="#FFA600"/>
  <circle cx="36" cy="31" r="5" fill="#ffffff" opacity="0.9"/><circle cx="54" cy="31" r="5" fill="#ffffff" opacity="0.7"/><circle cx="72" cy="31" r="5" fill="#ffffff" opacity="0.5"/>
  <rect x="92" y="19" width="460" height="24" rx="12" fill="#ffffff"/>
  <text x="108" y="36" font-size="12" fill="#666">/certificates</text>
  <rect x="762" y="19" width="114" height="24" rx="12" fill="#ffffff"/>
  <text x="819" y="36" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">PROVIDER</text>

  <text x="40" y="86" font-size="18" font-weight="700" fill="#111">Certificate Management</text>
  <text x="40" y="108" font-size="13" fill="#666">Manage, share and consume compliance certificates across the Catena-X dataspace</text>

  <rect x="690" y="72" width="160" height="40" rx="8" fill="#6B3FA0"/>
  <text x="770" y="97" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">+ Upload Certificate</text>
  <circle cx="690" cy="72" r="13" fill="#FFA600"/><text x="690" y="77" font-size="12" font-weight="700" fill="#fff" text-anchor="middle">1</text>

  <!-- search -->
  <rect x="40" y="132" width="470" height="40" rx="8" fill="#f7f7f7" stroke="#cfcfcf"/>
  <text x="58" y="157" font-size="13" fill="#9a9a9a">Search by name, BPN or issuer...</text>

  <!-- quick filter chips -->
  <rect x="524" y="132" width="70" height="40" rx="8" fill="#f3f3f3" stroke="#ddd"/><text x="559" y="157" font-size="12" fill="#555" text-anchor="middle">Valid</text>
  <rect x="602" y="132" width="80" height="40" rx="8" fill="#FFF7EC" stroke="#FFA600"/><text x="642" y="157" font-size="12" fill="#8a5a00" text-anchor="middle">Expiring</text>
  <rect x="690" y="132" width="80" height="40" rx="8" fill="#FEE7E2" stroke="#FF532F"/><text x="730" y="157" font-size="12" fill="#c0392b" text-anchor="middle">Expired</text>

  <!-- table header -->
  <rect x="40" y="188" width="810" height="34" fill="#f4f2f8"/>
  <text x="58" y="210" font-size="12" font-weight="700" fill="#555">Certificate</text>
  <text x="300" y="210" font-size="12" font-weight="700" fill="#555">Type</text>
  <text x="470" y="210" font-size="12" font-weight="700" fill="#555">Valid Until</text>
  <text x="610" y="210" font-size="12" font-weight="700" fill="#555">Status</text>
  <text x="740" y="210" font-size="12" font-weight="700" fill="#555">Actions</text>

  <!-- row 1 -->
  <rect x="40" y="222" width="810" height="46" fill="#ffffff" stroke="#eee"/>
  <text x="58" y="250" font-size="13" fill="#333">001-alice</text>
  <text x="300" y="250" font-size="12" fill="#555">ISO 9001</text>
  <text x="470" y="250" font-size="12" fill="#555">2027-01-01</text>
  <rect x="610" y="236" width="66" height="22" rx="11" fill="#F0F5D5"/><text x="643" y="251" font-size="11" font-weight="700" fill="#5c6b16" text-anchor="middle">Valid</text>
  <text x="740" y="250" font-size="11" fill="#6B3FA0">View · Publish · Update</text>

  <!-- row 2 -->
  <rect x="40" y="268" width="810" height="46" fill="#fbfbfb" stroke="#eee"/>
  <text x="58" y="296" font-size="13" fill="#333">001-alice.2</text>
  <text x="300" y="296" font-size="12" fill="#555">ISO 14001</text>
  <text x="470" y="296" font-size="12" fill="#555">2026-08-01</text>
  <rect x="610" y="282" width="76" height="22" rx="11" fill="#FFF0D6"/><text x="648" y="297" font-size="11" font-weight="700" fill="#8a5a00" text-anchor="middle">Expiring</text>
  <text x="740" y="296" font-size="11" fill="#6B3FA0">View · Publish · Update</text>

  <rect x="40" y="336" width="810" height="102" fill="#F3EDFA" stroke="#9D6FD4" stroke-width="1.5" rx="10"/>
  <text x="60" y="364" font-size="13" font-weight="700" fill="#6B3FA0">Naming</text>
  <text x="60" y="388" font-size="12" fill="#444">Name each certificate with your ID: 001-alice, then 001-alice.2 / .3 / .4 for the later scenarios.</text>
  <text x="60" y="412" font-size="12" fill="#777">Status (Valid / Expiring / Expired) is computed automatically from the validity dates.</text>
</svg>
