info:
  name: Consult My Part Global Assembly Progress
  type: http
  seq: 3

http:
  method: GET
  url: "{{MainICHUB-URL}}/v1/addons/pcf-kit/consumption/parts/{{MainManufacturerPartId}}/pcf-status"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Example - No progress
    request:
      url: "{{MainICHUB-URL}}/v1/addons/pcf-kit/consumption/parts/{{MainManufacturerPartId}}/pcf-status"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Thu, 12 Mar 2026 18:22:53 GMT
        - name: content-type
          value: application/json
        - name: content-length
          value: "125"
        - name: connection
          value: keep-alive
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
      body:
        type: json
        data: |-
          {
            "manufacturerPartId": "LKS-PART1",
            "totalSubParts": 2,
            "respondedSubParts": 0,
            "progressPercentage": 0,
            "overallStatus": "PENDING"
          }
  - name: Example - Half Received
    request:
      url: "{{MainICHUB-URL}}/v1/addons/pcf-kit/consumption/parts/{{MainManufacturerPartId}}/pcf-status"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Thu, 12 Mar 2026 18:50:14 GMT
        - name: content-type
          value: application/json
        - name: content-length
          value: "126"
        - name: connection
          value: keep-alive
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
      body:
        type: json
        data: |-
          {
            "manufacturerPartId": "LKS-PART1",
            "totalSubParts": 2,
            "respondedSubParts": 1,
            "progressPercentage": 50,
            "overallStatus": "PENDING"
          }
  - name: Example - All Received
    request:
      url: "{{MainICHUB-URL}}/v1/addons/pcf-kit/consumption/parts/{{MainManufacturerPartId}}/pcf-status"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: date
          value: Thu, 12 Mar 2026 18:54:02 GMT
        - name: content-type
          value: application/json
        - name: content-length
          value: "129"
        - name: connection
          value: keep-alive
        - name: strict-transport-security
          value: max-age=31536000; includeSubDomains
      body:
        type: json
        data: |-
          {
            "manufacturerPartId": "LKS-PART1",
            "totalSubParts": 2,
            "respondedSubParts": 2,
            "progressPercentage": 100,
            "overallStatus": "COMPLETED"
          }
