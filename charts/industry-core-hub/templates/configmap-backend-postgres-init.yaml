{{- if .Values.postgresql.enabled -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "industry-core-hub.postgresql.configmap" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "industry-core-hub.labels" . | nindent 4 }}
data:
  01-init-db-user.sh: |
    postgresql_create_ichub_user() {
      local -r escaped_password="${DATABASE_PASSWORD//\'/\'\'}"
      info "Creating user ichub"
      export PGPASSWORD="$POSTGRES_PASSWORD"
      echo "CREATE USER ichub WITH PASSWORD '${escaped_password}';" | psql -U postgres
    }
    postgresql_create_ichub_keycloak_user() {
      local -r escaped_password="${DATABASE_PASSWORD//\'/\'\'}"
      info "Creating user ichub_keycloak"
      export PGPASSWORD="$POSTGRES_PASSWORD"
      echo "CREATE USER ichub_keycloak WITH PASSWORD '${escaped_password}';" | psql -U postgres
    }
    postgresql_create_ichub_user
    postgresql_create_ichub_keycloak_user
  02-init-db.sql: |
    CREATE SCHEMA IF NOT EXISTS ichub_keycloak;
    ALTER SCHEMA ichub_keycloak OWNER TO ichub_keycloak;
    GRANT CREATE ON SCHEMA public TO ichub_keycloak;
    GRANT USAGE ON SCHEMA public TO ichub_keycloak;
    GRANT ALL PRIVILEGES ON ALL TABLES IN SCHEMA public TO ichub_keycloak;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO ichub_keycloak;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO ichub_keycloak;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO ichub_keycloak;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON FUNCTIONS TO ichub_keycloak;
    GRANT ALL PRIVILEGES ON SCHEMA ichub_keycloak TO ichub_keycloak;
    ALTER DEFAULT PRIVILEGES IN SCHEMA ichub_keycloak GRANT ALL ON TABLES TO ichub_keycloak;
    ALTER DEFAULT PRIVILEGES IN SCHEMA ichub_keycloak GRANT ALL ON SEQUENCES TO ichub_keycloak;

    CREATE SCHEMA ichub;
    ALTER SCHEMA ichub OWNER TO ichub;
    GRANT USAGE ON SCHEMA public TO ichub;
    GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA public TO ichub;
    GRANT ALL PRIVILEGES ON ALL SEQUENCES IN SCHEMA public TO ichub;

    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO ichub;
    ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON SEQUENCES TO ichub;
    SET statement_timeout = 0;
    SET lock_timeout = 0;
    SET idle_in_transaction_session_timeout = 0;
    SET client_encoding = 'UTF8';
    SET standard_conforming_strings = on;
    SELECT pg_catalog.set_config('search_path', '', false);
    SET check_function_bodies = false;
    SET xmloption = content;
    SET client_min_messages = warning;
    SET row_security = off;


    SET default_table_access_method = heap;

    CREATE TABLE public.batch (
        id integer NOT NULL,
        batch_id character varying NOT NULL,
        catalog_part_id integer NOT NULL,
        twin_id integer
    );

    CREATE TABLE public.batch_business_partner (
        batch_id integer NOT NULL,
        business_partner_id integer NOT NULL
    );

    CREATE TABLE public.business_partner (
        id integer NOT NULL,
        name character varying NOT NULL,
        bpnl character varying NOT NULL
    );

    CREATE TABLE public.catalog_part (
        id integer NOT NULL,
        manufacturer_part_id character varying NOT NULL,
        legal_entity_id integer NOT NULL,
        twin_id integer,
        name character varying NOT NULL,
        category character varying,
        bpns character varying,
        description character varying,
        materials json,
        width json,
        height json,
        length json,
        weight json
    );

    CREATE TABLE public.data_exchange_agreement (
        id integer NOT NULL,
        name character varying NOT NULL,
        business_partner_id integer NOT NULL,
        is_cancelled boolean DEFAULT false NOT NULL
    );

    CREATE TABLE public.data_exchange_contract (
        data_exchange_agreement_id integer NOT NULL,
        semantic_id character varying NOT NULL,
        edc_usage_policy_id character varying NOT NULL
    );

    CREATE TABLE public.enablement_service_stack (
        id integer NOT NULL,
        name character varying NOT NULL,
        connection_settings json,
        legal_entity_id integer NOT NULL
    );

    CREATE TABLE public.legal_entity (
        id integer NOT NULL,
        bpnl character varying NOT NULL
    );

    CREATE TABLE public.partner_catalog_part (
        id integer NOT NULL,
        business_partner_id integer NOT NULL,
        catalog_part_id integer NOT NULL,
        customer_part_id character varying DEFAULT ''::character varying NOT NULL
    );

    CREATE TABLE public.twin (
        id integer NOT NULL,
        global_id uuid DEFAULT gen_random_uuid() NOT NULL,
        aas_id uuid DEFAULT gen_random_uuid() NOT NULL,
        created_date timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        modified_date timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        asset_class character varying,
        additional_context character varying
    );

    CREATE TABLE public.twin_aspect (
        id integer NOT NULL,
        submodel_id uuid DEFAULT gen_random_uuid() NOT NULL,
        semantic_id character varying NOT NULL,
        twin_id integer NOT NULL
    );

    CREATE TABLE public.twin_aspect_registration (
        twin_aspect_id integer NOT NULL,
        enablement_service_stack_id integer NOT NULL,
        status smallint DEFAULT 0 NOT NULL,
        registration_mode smallint DEFAULT 0 NOT NULL,
        created_date timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        modified_date timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL
    );

    CREATE TABLE public.twin_exchange (
        twin_id integer NOT NULL,
        data_exchange_agreement_id integer NOT NULL,
        is_cancelled boolean DEFAULT false NOT NULL
    );

    CREATE TABLE public.twin_registration (
        twin_id integer NOT NULL,
        enablement_service_stack_id integer NOT NULL,
        dtr_registered boolean DEFAULT false NOT NULL
    );

    CREATE TABLE public.jis_part (
        id integer NOT NULL,
        partner_catalog_part_id integer NOT NULL,
        jis_number character varying NOT NULL,
        parent_order_number character varying,
        jis_call_date timestamp without time zone,
        twin_id integer
    );

    CREATE TABLE public.serialized_part (
        id integer NOT NULL,
        partner_catalog_part_id integer NOT NULL,
        part_instance_id character varying NOT NULL,
        van character varying,
        twin_id integer
    );

    CREATE TYPE public.notification_direction AS ENUM ('incoming', 'outgoing');
    CREATE TYPE public.notification_status AS ENUM ('received', 'read', 'pending', 'sent', 'failed');

    CREATE TABLE public.notifications (
        id integer NOT NULL,
        created_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        message_id uuid NOT NULL,
        sender_bpn character varying NOT NULL,
        receiver_bpn character varying NOT NULL,
        direction public.notification_direction NOT NULL,
        status public.notification_status DEFAULT 'pending'::public.notification_status NOT NULL,
        use_case VARCHAR(255),
        location character varying NOT NULL
    );

    CREATE TYPE public.pcf_exchange_direction AS ENUM ('outgoing', 'incoming');
    CREATE TYPE public.pcf_exchange_status AS ENUM ('pending', 'delivered', 'updated', 'rejected', 'failed', 'cancelled');
    CREATE TYPE public.pcf_exchange_type AS ENUM ('request', 'response');

    CREATE TABLE public.pcf_exchanges (
        id integer NOT NULL,
        request_id uuid DEFAULT gen_random_uuid() NOT NULL,
        created_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        updated_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        direction public.pcf_exchange_direction NOT NULL,
        status public.pcf_exchange_status DEFAULT 'pending'::public.pcf_exchange_status NOT NULL,
        type public.pcf_exchange_type DEFAULT 'request'::public.pcf_exchange_type NOT NULL,
        requesting_bpn character varying NOT NULL,
        responding_bpn character varying,
        manufacturer_part_id character varying,
        customer_part_id character varying,
        message character varying,
        pcf_location character varying,
        correlation_id character varying,
        version character varying NOT NULL DEFAULT 'v9.0.0'
    );

    CREATE TABLE public.pcf_relationships (
        id integer NOT NULL,
        main_manufacturer_part_id character varying NOT NULL,
        list_sub_manufacturer_part_id json
    );

    CREATE TYPE public.trust_level AS ENUM ('none', 'low', 'high', 'trusted');
    CREATE TYPE public.share_status AS ENUM ('Active', 'Pending', 'Revoked');
    CREATE TYPE public.received_certificate_status AS ENUM ('Pending', 'Received', 'Accepted', 'Rejected');
    CREATE TYPE public.outbound_request_status AS ENUM ('Pending', 'Found', 'NotFound', 'Failed');
    CREATE TYPE public.inbound_request_status AS ENUM ('NotFound', 'Registered', 'Available', 'Pushed');

    CREATE TABLE public.ccm (
        id integer NOT NULL,
        bpnl character varying NOT NULL,
        certificate_type character varying NOT NULL,
        issuer character varying NOT NULL,
        valid_from date NOT NULL,
        trust_level public.trust_level DEFAULT 'none'::public.trust_level NOT NULL,
        certificate_name character varying,
        registration_number character varying,
        area_of_application character varying,
        valid_until date,
        certificate_version character varying,
        validator_name character varying,
        validator_bpn character varying,
        issuer_bpn character varying,
        uploader_bpnl character varying,
        description character varying,
        doc bytea,
        created_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        updated_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        edc_asset_id character varying
    );

    CREATE TABLE public.ccm_site (
        id integer NOT NULL,
        ccm_id integer NOT NULL,
        site_bpn character varying NOT NULL,
        area_of_application character varying
    );

    CREATE TABLE public.certificate_share (
        id integer NOT NULL,
        certificate_id integer NOT NULL,
        consumer_bpnl character varying NOT NULL,
        last_shared_date timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        status public.share_status DEFAULT 'Pending'::public.share_status NOT NULL,
        rejection_reason text,
        created_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL
    );

    CREATE TABLE public.ccm_received (
        id integer NOT NULL,
        document_id character varying NOT NULL,
        provider_bpn character varying NOT NULL,
        certified_bpn character varying NOT NULL,
        certificate_type character varying NOT NULL,
        certificate_version character varying,
        issuer_name character varying,
        issuer_bpn character varying,
        validator_name character varying,
        valid_from date,
        valid_until date,
        trust_level character varying,
        registration_number character varying,
        area_of_application character varying,
        uploader_bpn character varying,
        doc bytea,
        local_status public.received_certificate_status DEFAULT 'Pending'::public.received_certificate_status NOT NULL,
        status_updated_at timestamp without time zone,
        rejection_reason text,
        notification_message_id character varying,
        received_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL
    );

    CREATE TABLE public.ccm_outbound_request (
        id integer NOT NULL,
        sender_bpn character varying NOT NULL,
        provider_bpn character varying NOT NULL,
        certified_bpn character varying NOT NULL,
        certificate_type character varying NOT NULL,
        location_bpns character varying,
        governance character varying,
        status public.outbound_request_status DEFAULT 'Pending'::public.outbound_request_status NOT NULL,
        notification_id character varying,
        document_id character varying,
        requested_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        updated_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL
    );

    CREATE TABLE public.ccm_inbound_request (
        id integer NOT NULL,
        consumer_bpn character varying NOT NULL,
        certified_bpn character varying NOT NULL,
        certificate_type character varying NOT NULL,
        location_bpns character varying,
        certificate_id integer,
        status public.inbound_request_status NOT NULL,
        notification_id character varying,
        consumer_status character varying,
        received_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL,
        updated_at timestamp without time zone DEFAULT (now() AT TIME ZONE 'utc'::text) NOT NULL
    );

