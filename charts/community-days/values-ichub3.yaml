dataconsumerOne:
  enabled: true
  seedTestdata: false
  nameOverride: dataprovider
  secrets:
    edc-wallet-secret: BPNL000000000342
  dataspace-connector-bundle:
    tractusx-connector:
      nameOverride: dataprovider-edc
      participant:
        id: BPNL000000000342
      iatp:
        id: did:web:ssi-dim-wallet-stub.txcd.arena2036-x.de:BPNL000000000342
        trustedIssuers:
          - did:web:ssi-dim-wallet-stub.txcd.arena2036-x.de:BPNL00000003CRHK
        sts:
          dim:
            url: https://ssi-dim-wallet-stub.txcd.arena2036-x.de/api/sts
          oauth:
            token_url: https://ssi-dim-wallet-stub.txcd.arena2036-x.de/oauth/token
            client:
              id: BPNL000000000342
              secret_alias: edc-wallet-secret
      controlplane:
        env:
          TX_IAM_IATP_CREDENTIALSERVICE_URL: https://ssi-dim-wallet-stub.txcd.arena2036-x.de/api
          EDC_IAM_DID_WEB_USE_HTTPS: true
        bdrs:
          server:
            url: https://ssi-dim-wallet-stub.txcd.arena2036-x.de/api/v1/directory
        endpoints:
          management:
            authKey: HACKATHON1
        ingresses:
          - enabled: true
            hostname: "ichub3-connector-controlplane.txcd.arena2036-x.app"
            endpoints:
              - default
              - protocol
              - management
            className: "nginx"
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            tls:
              enabled: true
              secretName: "ichub3-connector-controlplane.txcd.arena2036-x.app-tls"
      dataplane:
        env:
          TX_IAM_IATP_CREDENTIALSERVICE_URL: https://ssi-dim-wallet-stub.txcd.arena2036-x.de/api
          EDC_IAM_DID_WEB_USE_HTTPS: true
        ingresses:
          - enabled: true
            hostname: "ichub3-connector-dataplane.txcd.arena2036-x.app"
            endpoints:
              - default
              - public
            className: "nginx"
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
            tls:
              enabled: true
              secretName: "ichub3-connector-dataplane.txcd.arena2036-x.app-tls"
        token:
          signer:
            privatekey_alias: tokenSignerPrivateKey
          verifier:
            publickey_alias: tokenSignerPublicKey
      install:
        postgresql: false
        vault: false
      postgresql:
        jdbcUrl: "jdbc:postgresql://{{ .Release.Name }}-dataprovider-db:5432/edc"
        auth:
          user: "dbusertxdataprovider"
          password: "dbpasswordtxdataprovider"
          postgresPassword: "dbpasswordtxdataprovider"
      vault:
        hashicorp:
          url: http://{{ .Release.Name }}-edc-dataprovider-vault:8200

    postgresql:
      nameOverride: dataprovider-db
      auth:
        user: "dbusertxdataprovider"
        password: "dbpasswordtxdataprovider"
        postgresPassword: "dbpasswordtxdataprovider"
      commonLabels:
        tarea: backup-bot
      primary:
        persistence:
          enabled: false
          size: 10Gi

    vault:
      nameOverride: edc-dataprovider-vault
      enabled: true

  data-persistence-layer-bundle:
    enabled: false
    simple-data-backend:
      nameOverride: dataprovider-submodelserver
      ingress:
        enabled: true
        className: "nginx"
        hosts:
          - host: "dataprovider-submodelserver.tx.test"
            paths:
              - path: "/"
                pathType: "Prefix"

  digital-twin-bundle:
    enabled: true
    digital-twin-registry:
      nameOverride: dataprovider-dtr
      keycloak:
        fullnameOverride: "ichub3-registry-keycloak"
      registry:
        authentication: false
        host: ichub3-connector-dtr.txcd.arena2036-x.app
        dataSource:
          url: "jdbc:postgresql://ichub3-dataprovider-digital-twin-db:5432/dtr"

    postgresql:
      fullnameOverride: ""
      nameOverride: "dataprovider-digital-twin-db"
      commonLabels:
        tarea: backup-bot
      primary:
        service:
          annotations:
            backup/targets: "dtr:postgres:ichub3-dataprovider-digital-twin-db:postgres-password"
        persistence:
          enabled: false
          size: 10Gi

industry-core-hub:
  enabled: true
  participantId: "BPNL000000000342"
  backend:
    enabled: true
    cors:
      enabled: false
    configuration:
      authorization:
        apiKey:
          header: "X-Api-Key"
          value: "HACKATHON1-HACKATHON1-HACKATHON1"
        keycloak:
          enabled: false
      consumer:
        discovery:
          discovery_finder:
            url: "https://semantics.txcd.arena2036-x.de/discoveryfinder/api/v1.0/administration/connectors/discovery/search"
          oauth:
            url: "https://centralidp.txcd.arena2036-x.de/auth/"
            realm: "CX-Central"
            client_id: "sa3"
            client_secret: "n5ZHLfc9eLV9VVpc1ijGkpZycyLkBzqX"
        connector:
          controlplane:
            hostname: "https://ichub3-connector-controlplane.txcd.arena2036-x.app"
            apiKeyHeader: "X-Api-Key"
            apiKey: "HACKATHON1"
            managementPath: "/management"
            protocolPath: "/api/v1/dsp"
            catalogPath: "/catalog"
      provider:
        connector:
          controlplane:
            hostname: "https://ichub3-connector-controlplane.txcd.arena2036-x.app"
            apiKeyHeader: "X-Api-Key"
            apiKey: "HACKATHON1"
            managementPath: "/management"
            protocolPath: "/api/v1/dsp"
          dataplane:
            hostname: "https://ichub3-connector-dataplane.txcd.arena2036-x.app"
            publicPath: "/api/public"
        digitalTwinRegistry:
          hostname: "http://ichub3-connector-dataprovider-dtr:8080"
          apiPath: "/api/v3"
        digitalTwinEventAPI:
          hostname: "https://ichub3-ichub-backend.txcd.arena2036-x.app"
        uniqueIdPush:
          hostname: "https://ichub3-ichub-backend.txcd.arena2036-x.app"
          sendOnShare: true
        pcfExchange:
          enabled: true
          hostname: "https://ichub3-ichub-backend.txcd.arena2036-x.app"
        ccm:
          enabled: true
          hostname: "https://ichub3-ichub-backend.txcd.arena2036-x.app"
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/cors-allow-origin: "https://ichub3-ichub-frontend.txcd.arena2036-x.app"
        nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
        nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Api-Key"
        nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
      tls:
        - secretName: "ichub3-ichub-backend.txcd.arena2036-x.app-tls"
          hosts:
            - "ichub3-ichub-backend.txcd.arena2036-x.app"
      hosts:
        - host: "ichub3-ichub-backend.txcd.arena2036-x.app"
          paths:
            - path: /
              pathType: ImplementationSpecific
              backend:
                service: "backend"
                port: 8000
    persistence:
      enabled: false
      data:
        enabled: false
        size: 1Gi
        accessMode: ReadWriteOnce
      logs:
        enabled: false
        size: 1Gi
        accessMode: ReadWriteOnce
  frontend:
    enabled: true
    config:
      ichubBackendUrl: "https://ichub3-ichub-backend.txcd.arena2036-x.app/v1"
      requireHttpsUrlPattern: true
      apiKey: "HACKATHON1-HACKATHON1-HACKATHON1"
      apiKeyHeader: "X-Api-Key"
      authEnabled: false
      authProvider: "none"
    env:
      backendUrl: "https://ichub3-ichub-backend.txcd.arena2036-x.app/v1"
    ingress:
      enabled: true
      className: "nginx"
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/cors-allow-origin: "https://*.txcd.arena2036-x.app"
      tls:
        - secretName: "ichub3-ichub-frontend.txcd.arena2036-x.app-tls"
          hosts:
            - "ichub3-ichub-frontend.txcd.arena2036-x.app"
      hosts:
        - host: "ichub3-ichub-frontend.txcd.arena2036-x.app"
          paths:
            - path: /
              pathType: Prefix
              backend:
                service: "frontend"
                port: 8080
  postgresql:
    enabled: true
    auth:
      database: "ichub-postgres"
      port: 5432
      existingSecret: "ichub3-postgres-secret"
      secretKeys:
        adminPasswordKey: "postgres-password"
      ichubUser: "ichub"
    extraEnvVars:
      - name: "DATABASE_PASSWORD"
        valueFrom:
          secretKeyRef:
            name: "ichub3-postgres-secret"
            key: "ichub-password"
    persistence:
      enabled: false
      size: 10Gi
